name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:
    inputs:
      channel:
        description: "Juju channel risk (PRs use stable; scheduled runs use stable and edge)"
        required: true
        type: choice
        default: stable
        options:
          - stable
          - candidate
          - beta
          - edge
  schedule:
    # min (0-59) / hour (0-23) / day (1-31) / month (1-12) / weekday (SUN-SAT)
    - cron: "43 6 * * MON"
      timezone: "Pacific/Auckland"

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Run linting and static type checking
        run: make lint

  unit:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.8", "3.10", "3.12", "3.14"]
        exclude:
          - os: macos-latest
            python-version: "3.8"

    steps:
      - name: Check out repo
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Run unit tests
        run: make unit

  init-integration:
    runs-on: ubuntu-latest

    outputs:
      juju-channels: ${{ steps.resolve.outputs.juju-channels }}

    steps:
      - name: Resolve Juju channels
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          # 4.1/stable does not exist yet, so it is only included for non-stable risks.
          if [ "$EVENT_NAME" = "schedule" ]; then
            CHANNELS='["3/stable", "3/edge", "4.0/stable", "4.0/edge", "4.1/edge"]'
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$INPUT_CHANNEL" = "stable" ]; then
              CHANNELS='["3/stable", "4.0/stable"]'
            else
              CHANNELS="[\"3/$INPUT_CHANNEL\", \"4.0/$INPUT_CHANNEL\", \"4.1/$INPUT_CHANNEL\"]"
            fi
          else
            CHANNELS='["3/stable", "4.0/stable"]'
          fi
          echo "juju-channels=$CHANNELS" >> "$GITHUB_OUTPUT"

  integration-k8s:
    needs: init-integration
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        juju-channel: ${{ fromJSON(needs.init-integration.outputs.juju-channels) }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.juju-channel }}-k8s
      cancel-in-progress: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install concierge
        run: sudo snap install --classic concierge

      - name: Prepare Juju
        env:
          JUJU_CHANNEL: ${{ matrix.juju-channel }}
        run: sudo concierge prepare --verbose --juju-channel="$JUJU_CHANNEL" --charmcraft-channel=3.x/stable -p k8s

      - name: Pack test charms
        run: make pack

      - name: Run integration tests
        run: make integration-k8s

  integration-machine:
    needs: init-integration
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        juju-channel: ${{ fromJSON(needs.init-integration.outputs.juju-channels) }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.juju-channel }}-machine
      cancel-in-progress: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install concierge
        run: sudo snap install --classic concierge

      - name: Prepare Juju
        env:
          JUJU_CHANNEL: ${{ matrix.juju-channel }}
        run: sudo concierge prepare --verbose --juju-channel="$JUJU_CHANNEL" --charmcraft-channel=3.x/stable -p machine

      - name: Pack test charms
        run: make pack

      - name: Run integration tests
        run: make integration-machine

  open-issue-on-failure-if-scheduled:
    if: ${{ failure() && github.event_name == 'schedule' }}
    needs: [integration-k8s, integration-machine]
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Create issue on failure
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled tests failed" \
            --body "Scheduled tests failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
